<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Estudio de retiro</title>
<style>
body{
font-family:Arial;
padding:20px;
}
button{
padding:12px;
background:#2e7df6;
color:white;
border:none;
border-radius:8px;
font-size:18px;
}
</style>
</head>

<body>

<h2>Estudio de retiro</h2>

<p>Cliente: <span id="cliente"></span></p>
<p>SBC: <span id="sbc"></span></p>
<p>Semanas: <span id="semanas"></span></p>
<p>Edad retiro: <span id="edad"></span></p>

<br>

<button onclick="window.print()">
Generar PDF
</button>

<script>
const params = new URLSearchParams(window.location.search);

document.getElementById("cliente").textContent = params.get("cliente") || "";
document.getElementById("sbc").textContent = params.get("sbc") || "";
document.getElementById("semanas").textContent = params.get("semanas") || "";
document.getElementById("edad").textContent = params.get("edad") || "";
</script>
  
</body>
</html>
