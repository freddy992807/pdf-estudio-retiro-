<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Estimación de Pensión Ley 73</title>

<script>

function money(x){
return "$"+Number(x).toLocaleString();
}

function mensual(x){
return "$"+(Number(x)/12).toLocaleString();
}

function getParametro(nombre){
const url=new URL(window.location.href);
return decodeURIComponent(url.searchParams.get(nombre));
}

const clienteBuscado=getParametro("id_cliente");

async function cargarCliente(){

const url="https://docs.google.com/spreadsheets/d/179os4g9f0pTPW_vSa7hkr9ZVtc-qzPp1tSMROuVZ4zI/gviz/tq?tqx=out:json";

const res=await fetch(url);
let text=await res.text();

text=text.substring(47).slice(0,-2);

const json=JSON.parse(text);

const headers=json.table.cols.map(c=>c.label);
const rows=json.table.rows;

let cliente=null;

rows.forEach(r=>{

let obj={};

r.c.forEach((cell,i)=>{

obj[headers[i]]=cell?cell.v:"";

});

if(obj.nombre===clienteBuscado){

cliente=obj;

}

});

if(!cliente){

alert("Cliente no encontrado");

return;

}

llenar(cliente);

}

function llenar(data){

document.getElementById("nombre").innerHTML=data.nombre;
document.getElementById("curp").innerHTML=data.curp;
document.getElementById("nss").innerHTML=data.nss;

document.getElementById("sbc").innerHTML=money(data.sbc);
document.getElementById("uma").innerHTML=data.sbc_uma;
document.getElementById("semanas").innerHTML=data.semanas;

document.getElementById("por_cb").innerHTML=data.cuantia_basica+"%";
document.getElementById("por_inc").innerHTML=data.incremento_anual+"%";
document.getElementById("excedente").innerHTML=data.excedente_semanas;
document.getElementById("num_inc").innerHTML=data.incrementos_anuales;

document.getElementById("ayuda_esposa").innerHTML=money(data.ayu_espo);
document.getElementById("ayuda_hijos").innerHTML=money(data.ayu_hijos);
document.getElementById("ayuda_total").innerHTML=money(data.total_ayudas);

document.getElementById("cb_anual").innerHTML=money(data.CB_anual);
document.getElementById("inc_total").innerHTML=money(data.INC_total);
document.getElementById("reforma_total").innerHTML=money(data.total_reforma);
document.getElementById("pension_final").innerHTML=money(data.total_reforma);

let edades=[60,61,62,63,64,65];

edades.forEach(e=>{

let anual=data["edad_"+e];

document.getElementById("edad"+e+"_anual").innerHTML=money(anual);
document.getElementById("edad"+e+"_mensual").innerHTML=mensual(anual);

});

}

window.onload=cargarCliente;

</script>

</head>

<body>

<h2>Estimación de Pensión Ley 73</h2>

<div>

Nombre: <span id="nombre"></span><br>
CURP: <span id="curp"></span><br>
NSS: <span id="nss"></span><br>

</div>

</body>
</html>
